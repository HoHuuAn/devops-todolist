services:
  fe:
    image: ${DOCKER_USERNAME}/devops-todolist-fe:latest
    container_name: devops_todolist_fe
    depends_on:
      be:
        condition: service_healthy
    networks:
      - todolistnet
    restart: unless-stopped

  be:
    image: ${DOCKER_USERNAME}/devops-todolist-be:latest
    container_name: devops_todolist_be
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - DB_PATH=/data/app.db
    volumes:
      - db-data:/data
    networks:
      - todolistnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]

  redis:
    image: redis:7-alpine
    container_name: devops_todolist_redis
    networks:
      - todolistnet
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  nginx-proxy:
    image: nginx:alpine
    container_name: devops_todolist_nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fe
      - be
    networks:
      - todolistnet
    restart: unless-stopped

networks:
  todolistnet:
    driver: bridge

volumes:
  db-data:
    name: devops_todolist_db_data
  redis-data:
    name: devops_todolist_redis_data
