name: ci-cd

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_FE: ${{ secrets.DOCKER_USERNAME }}/devops-todolist-fe
  IMAGE_BE: ${{ secrets.DOCKER_USERNAME }}/devops-todolist-be

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            FE/package-lock.json
            BE/package-lock.json

      - name: Install FE dependencies
        run: npm ci --prefix FE

      - name: Build FE
        run: npm run build --prefix FE

      - name: Install BE dependencies
        run: npm ci --prefix BE

      - name: Lint BE entry
        run: node -c BE/server.js

  build-push:
    runs-on: ubuntu-latest
    needs: test-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push FE image
        uses: docker/build-push-action@v6
        with:
          context: ./FE
          file: ./FE/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FE }}:latest
            ${{ env.IMAGE_FE }}:${{ github.sha }}

      - name: Build and push BE image
        uses: docker/build-push-action@v6
        with:
          context: ./BE
          file: ./BE/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BE }}:latest
            ${{ env.IMAGE_BE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Sync production compose file
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" \
            docker-compose.prod.yml \
            azureuser@${{ vars.HOST }}:/home/azureuser/docker-compose.prod.yml

      - name: Deploy on remote host
        run: |
          printf '%s' "${{ secrets.DOCKER_TOKEN }}" | \
            ssh -o StrictHostKeyChecking=no azureuser@${{ vars.HOST }} \
            "docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin"

          ssh -o StrictHostKeyChecking=no azureuser@${{ vars.HOST }} \
            "DOCKER_USERNAME='${{ secrets.DOCKER_USERNAME }}' docker compose -f /home/azureuser/docker-compose.prod.yml pull"

          ssh -o StrictHostKeyChecking=no azureuser@${{ vars.HOST }} \
            "DOCKER_USERNAME='${{ secrets.DOCKER_USERNAME }}' docker compose -f /home/azureuser/docker-compose.prod.yml up -d"
